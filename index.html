<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不規則動詞測驗 - P.5 English</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); margin:0; padding:15px; color:#333; }
        .container { max-width:900px; margin:0 auto; background:white; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,0.1); overflow:hidden; }
        header { background:#4a6fa5; color:white; padding:20px; text-align:center; }
        h1 { margin:0; font-size:2.2em; }
        .main { padding:20px; }
        .score { text-align:center; font-size:1.5em; margin:15px; padding:12px; background:#e8f5e9; border-radius:10px; font-weight:bold; }
        .question { background:#f8f9fa; padding:20px; margin-bottom:20px; border-radius:12px; border-left:6px solid #4a6fa5; }
        .verb-base { font-size:1.8em; font-weight:bold; color:#2c3e50; text-align:center; margin:15px 0; }
        .input-group { display:flex; gap:15px; flex-wrap:wrap; }
        .input-box { flex:1; min-width:260px; }
        .input-box label { display:block; font-weight:bold; margin-bottom:6px; color:#555; }
        input { width:100%; padding:12px; font-size:1.1em; border:2px solid #ddd; border-radius:8px; box-sizing:border-box; }
        button { padding:12px 25px; margin:8px; background:#4a6fa5; color:white; border:none; border-radius:8px; cursor:pointer; font-size:1.05em; }
        .submit-all { display:block; margin:25px auto; padding:15px 40px; font-size:1.2em; width:80%; max-width:400px; }
        .feedback { margin-top:15px; padding:15px; border-radius:10px; font-weight:bold; }
        .correct { background:#d4edda; color:#155724; }
        .wrong { background:#f8d7da; color:#721c24; }
        .tabs { display:flex; justify-content:center; flex-wrap:wrap; margin:15px 0; }
        .tab-btn { padding:10px 20px; margin:5px; background:#e2e8f0; border:none; border-radius:8px; cursor:pointer; }
        .tab-btn.active { background:#4a6fa5; color:white; }
        .table-wrapper { overflow-x:auto; border:1px solid #ddd; border-radius:8px; }
        table { min-width:900px; width:100%; border-collapse:collapse; }
        th, td { padding:12px; border:1px solid #ddd; white-space:nowrap; }
        th { background:#4a6fa5; color:white; }
        /* 分組顏色 */
        tr.regular td { background:#e6f4ea; }
        tr.nochange td { background:#e3f2fd; }
        tr.group-ought td { background:#fff3e0; }      /* 淺橙 - ought/aught */
        tr.group-vowel td { background:#f3e5f5; }     /* 淺紫 - i/a */
        tr.group-ew td { background:#e0f2f1; }        /* 淺青 - ew/own */
        tr.group-oke td { background:#e8f5e9; }       /* 淺綠 - oke/oken */
        tr.group-it td { background:#fff8e1; }        /* 淺黃 - it/itten */
        tr.group-ave td { background:#fce4ec; }       /* 淺粉 - ave/iven */
        tr.group-eat td { background:#e0f7fa; }       /* 淺青 - eat/aten */
        tr.group-other td { background:#f5f5f5; }     /* 淺灰 - 其他 */
    </style>
</head>
<body>
    <div class="container">
        <header><h1>🐱 動詞測驗</h1><p class="subtitle">鮑思高尊華小學 P.5 English</p></header>
        <div class="main">
            <div class="score" id="score">得分: 0 / 10</div>
            <div id="quiz-container"></div>
            <button class="submit-all" onclick="submitAllAnswers()">全部提交 & 查看答案</button>
            <div style="text-align:center; margin:20px 0;">
                <button onclick="startNewQuiz()">🔄 新一輪測驗</button>
                <button onclick="showAllVerbs()">📋 查看完整動詞表</button>
            </div>
            <div id="verbs-table" style="display:none;">
                <h2 style="text-align:center;">完整動詞表</h2>
                <div class="tabs" id="tabs"></div>
                <div class="table-wrapper">
                    <table id="full-table"></table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const allVerbs = [
            // 加ed
            {"base":"add","ing":"adding","past":"added","pp":"added","type":"regular"},
            {"base":"annoy","ing":"annoying","past":"annoyed","pp":"annoyed","type":"regular"},
            {"base":"beg","ing":"begging","past":"begged","pp":"begged","type":"regular"},
            {"base":"close","ing":"closing","past":"closed","pp":"closed","type":"regular"},
            {"base":"count","ing":"counting","past":"counted","pp":"counted","type":"regular"},
            {"base":"cry","ing":"crying","past":"cried","pp":"cried","type":"regular"},
            {"base":"dance","ing":"dancing","past":"danced","pp":"danced","type":"regular"},
            {"base":"end","ing":"ending","past":"ended","pp":"ended","type":"regular"},
            {"base":"enjoy","ing":"enjoying","past":"enjoyed","pp":"enjoyed","type":"regular"},
            {"base":"empty","ing":"emptying","past":"emptied","pp":"emptied","type":"regular"},
            {"base":"fry","ing":"frying","past":"fried","pp":"fried","type":"regular"},
            {"base":"invite","ing":"inviting","past":"invited","pp":"invited","type":"regular"},
            {"base":"laugh","ing":"laughing","past":"laughed","pp":"laughed","type":"regular"},
            {"base":"plan","ing":"planning","past":"planned","pp":"planned","type":"regular"},
            {"base":"pray","ing":"praying","past":"prayed","pp":"prayed","type":"regular"},
            {"base":"rain","ing":"raining","past":"rained","pp":"rained","type":"regular"},
            {"base":"stay","ing":"staying","past":"stayed","pp":"stayed","type":"regular"},
            {"base":"stop","ing":"stopping","past":"stopped","pp":"stopped","type":"regular"},
            {"base":"study","ing":"studying","past":"studied","pp":"studied","type":"regular"},
            {"base":"taste","ing":"tasting","past":"tasted","pp":"tasted","type":"regular"},
            {"base":"tidy","ing":"tidying","past":"tidied","pp":"tidied","type":"regular"},
            {"base":"travel","ing":"travelling","past":"travelled","pp":"travelled","type":"regular"},
            {"base":"try","ing":"trying","past":"tried","pp":"tried","type":"regular"},
            {"base":"type","ing":"typing","past":"typed","pp":"typed","type":"regular"},
            {"base":"wash","ing":"washing","past":"washed","pp":"washed","type":"regular"},
            // 無變化
            {"base":"cost","ing":"costing","past":"cost","pp":"cost","type":"nochange"},
            {"base":"cut","ing":"cutting","past":"cut","pp":"cut","type":"nochange"},
            {"base":"hit","ing":"hitting","past":"hit","pp":"hit","type":"nochange"},
            {"base":"hurt","ing":"hurting","past":"hurt","pp":"hurt","type":"nochange"},
            {"base":"put","ing":"putting","past":"put","pp":"put","type":"nochange"},
            {"base":"read","ing":"reading","past":"read","pp":"read","type":"nochange"},
            // 有變化 (近似變化已排在一起)
            // Group 1: ought/aught 類
            {"base":"buy","ing":"buying","past":"bought","pp":"bought","type":"irregular","group":"ought"},
            {"base":"catch","ing":"catching","past":"caught","pp":"caught","type":"irregular","group":"ought"},
            {"base":"teach","ing":"teaching","past":"taught","pp":"taught","type":"irregular","group":"ought"},
            {"base":"bring","ing":"bringing","past":"brought","pp":"brought","type":"irregular","group":"ought"},
            {"base":"think","ing":"thinking","past":"thought","pp":"thought","type":"irregular","group":"ought"},
            // Group 2: i/a 類
            {"base":"begin","ing":"beginning","past":"began","pp":"begun","type":"irregular","group":"vowel"},
            {"base":"drink","ing":"drinking","past":"drank","pp":"drunk","type":"irregular","group":"vowel"},
            {"base":"sing","ing":"singing","past":"sang","pp":"sung","type":"irregular","group":"vowel"},
            {"base":"swim","ing":"swimming","past":"swam","pp":"swum","type":"irregular","group":"vowel"},
            {"base":"ring","ing":"ringing","past":"rang","pp":"rung","type":"irregular","group":"vowel"},
            {"base":"run","ing":"running","past":"ran","pp":"run","type":"irregular","group":"vowel"},
            {"base":"come","ing":"coming","past":"came","pp":"come","type":"irregular","group":"vowel"},
            {"base":"become","ing":"becoming","past":"became","pp":"become","type":"irregular","group":"vowel"},
            // Group 3: ew/own 類
            {"base":"blow","ing":"blowing","past":"blew","pp":"blown","type":"irregular","group":"ew"},
            {"base":"draw","ing":"drawing","past":"drew","pp":"drawn","type":"irregular","group":"ew"},
            {"base":"fly","ing":"flying","past":"flew","pp":"flown","type":"irregular","group":"ew"},
            {"base":"grow","ing":"growing","past":"grew","pp":"grown","type":"irregular","group":"ew"},
            {"base":"know","ing":"knowing","past":"knew","pp":"known","type":"irregular","group":"ew"},
            {"base":"throw","ing":"throwing","past":"threw","pp":"thrown","type":"irregular","group":"ew"},
            {"base":"show","ing":"showing","past":"showed","pp":"shown","type":"irregular","group":"ew"},
            // Group 4: oke/oken 類
            {"base":"break","ing":"breaking","past":"broke","pp":"broken","type":"irregular","group":"oke"},
            {"base":"speak","ing":"speaking","past":"spoke","pp":"spoken","type":"irregular","group":"oke"},
            {"base":"steal","ing":"stealing","past":"stole","pp":"stolen","type":"irregular","group":"oke"},
            {"base":"wake","ing":"waking","past":"woke","pp":"woken","type":"irregular","group":"oke"},
            {"base":"choose","ing":"choosing","past":"chose","pp":"chosen","type":"irregular","group":"oke"},
            // Group 5: it/itten 類
            {"base":"bite","ing":"biting","past":"bit","pp":"bitten","type":"irregular","group":"it"},
            {"base":"hide","ing":"hiding","past":"hid","pp":"hidden","type":"irregular","group":"it"},
            // Group 6: ave/iven 類
            {"base":"give","ing":"giving","past":"gave","pp":"given","type":"irregular","group":"ave"},
            {"base":"forgive","ing":"forgiving","past":"forgave","pp":"forgiven","type":"irregular","group":"ave"},
            // Group 7: eat/aten 類
            {"base":"beat","ing":"beating","past":"beat","pp":"beaten","type":"irregular","group":"eat"},
            {"base":"eat","ing":"eating","past":"ate","pp":"eaten","type":"irregular","group":"eat"},
            // 其他
            {"base":"see","ing":"seeing","past":"saw","pp":"seen","type":"irregular","group":"other"},
            {"base":"get","ing":"getting","past":"got","pp":"got","type":"irregular","group":"other"},
            {"base":"forget","ing":"forgetting","past":"forgot","pp":"forgotten","type":"irregular","group":"other"},
            {"base":"sell","ing":"selling","past":"sold","pp":"sold","type":"irregular","group":"other"},
            {"base":"tell","ing":"telling","past":"told","pp":"told","type":"irregular","group":"other"},
            {"base":"send","ing":"sending","past":"sent","pp":"sent","type":"irregular","group":"other"},
            {"base":"spend","ing":"spending","past":"spent","pp":"spent","type":"irregular","group":"other"},
            {"base":"lend","ing":"lending","past":"lent","pp":"lent","type":"irregular","group":"other"},
            {"base":"find","ing":"finding","past":"found","pp":"found","type":"irregular","group":"other"},
            {"base":"take","ing":"taking","past":"took","pp":"taken","type":"irregular","group":"other"},
            {"base":"do","ing":"doing","past":"did","pp":"done","type":"irregular","group":"other"},
            {"base":"go","ing":"going","past":"went","pp":"gone","type":"irregular","group":"other"},
            {"base":"have","ing":"having","past":"had","pp":"had","type":"irregular","group":"other"},
            {"base":"wear","ing":"wearing","past":"wore","pp":"worn","type":"irregular","group":"other"},
            {"base":"tear","ing":"tearing","past":"tore","pp":"torn","type":"irregular","group":"other"},
            {"base":"rise","ing":"rising","past":"rose","pp":"risen","type":"irregular","group":"other"},
            {"base":"drive","ing":"driving","past":"drove","pp":"driven","type":"irregular","group":"other"},
            {"base":"make","ing":"making","past":"made","pp":"made","type":"irregular","group":"other"},
            {"base":"mean","ing":"meaning","past":"meant","pp":"meant","type":"irregular","group":"other"},
            {"base":"meet","ing":"meeting","past":"met","pp":"met","type":"irregular","group":"other"},
            {"base":"pay","ing":"paying","past":"paid","pp":"paid","type":"irregular","group":"other"},
            {"base":"say","ing":"saying","past":"said","pp":"said","type":"irregular","group":"other"},
            {"base":"shine","ing":"shining","past":"shone","pp":"shone","type":"irregular","group":"other"},
            {"base":"shoot","ing":"shooting","past":"shot","pp":"shot","type":"irregular","group":"other"},
            {"base":"sit","ing":"sitting","past":"sat","pp":"sat","type":"irregular","group":"other"},
            {"base":"sleep","ing":"sleeping","past":"slept","pp":"slept","type":"irregular","group":"other"},
            {"base":"spend","ing":"spending","past":"spent","pp":"spent","type":"irregular","group":"other"},
            {"base":"stand","ing":"standing","past":"stood","pp":"stood","type":"irregular","group":"other"},
            {"base":"sweep","ing":"sweeping","past":"swept","pp":"swept","type":"irregular","group":"other"},
            {"base":"swim","ing":"swimming","past":"swam","pp":"swum","type":"irregular","group":"other"},
            {"base":"take","ing":"taking","past":"took","pp":"taken","type":"irregular","group":"other"},
            {"base":"tell","ing":"telling","past":"told","pp":"told","type":"irregular","group":"other"},
            {"base":"throw","ing":"throwing","past":"threw","pp":"thrown","type":"irregular","group":"other"}
        ];

        let currentQuiz = [];
        let score = 0;

        function startNewQuiz() {
            score = 0;
            document.getElementById('score').textContent = '得分: 0 / 10';
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            const shuffled = [...allVerbs].sort(() => Math.random() - 0.5);
            currentQuiz = shuffled.slice(0, 5);
            currentQuiz.forEach((verb, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';
                qDiv.innerHTML = `
                    <div style="font-size:1.2em;color:#666;">問題 ${index + 1}</div>
                    <div class="verb-base">${verb.base}</div>
                    <div class="input-group">
                        <div class="input-box"><label>過去式 (Past Tense)</label><input type="text" id="past-${index}" placeholder="輸入過去式"></div>
                        <div class="input-box"><label>過去分詞 (Past Participle)</label><input type="text" id="pp-${index}" placeholder="輸入過去分詞"></div>
                    </div>
                    <div id="feedback-${index}" class="feedback" style="display:none;"></div>
                `;
                container.appendChild(qDiv);
            });
        }

        function submitAllAnswers() {
            score = 0;
            currentQuiz.forEach((verb, index) => {
                const pastInput = document.getElementById(`past-${index}`);
                const ppInput = document.getElementById(`pp-${index}`);
                const feedback = document.getElementById(`feedback-${index}`);
                const userPast = pastInput.value.trim().toLowerCase();
                const userPp = ppInput.value.trim().toLowerCase();
                const correctPast = verb.past.toLowerCase().replace(/ \(.*\)/g, '').split('/')[0].trim();
                const correctPp = verb.pp.toLowerCase().replace(/ \(.*\)/g, '').split('/')[0].trim();
                const isPastCorrect = userPast === correctPast;
                const isPpCorrect = userPp === correctPp;
                if (isPastCorrect) score++;
                if (isPpCorrect) score++;
                let html = isPastCorrect && isPpCorrect ? 
                    `✅ 全部正確！<br>過去式: <strong>${verb.past}</strong><br>過去分詞: <strong>${verb.pp}</strong>` :
                    `過去式: ${isPastCorrect ? '✅' : '❌'} <strong>${verb.past}</strong><br>過去分詞: ${isPpCorrect ? '✅' : '❌'} <strong>${verb.pp}</strong>`;
                feedback.innerHTML = html;
                feedback.className = (isPastCorrect && isPpCorrect) ? 'feedback correct' : 'feedback wrong';
                feedback.style.display = 'block';
                pastInput.disabled = ppInput.disabled = true;
            });
            document.getElementById('score').textContent = `得分: ${score} / 10`;
        }

        function showAllVerbs() {
            const tableDiv = document.getElementById('verbs-table');
            const tabsDiv = document.getElementById('tabs');
            tabsDiv.innerHTML = `
                <button class="tab-btn active" onclick="filterTable('all')">全部</button>
                <button class="tab-btn" onclick="filterTable('regular')">加ed</button>
                <button class="tab-btn" onclick="filterTable('nochange')">無變化</button>
                <button class="tab-btn" onclick="filterTable('irregular')">有變化</button>
            `;
            renderTable(allVerbs);
            tableDiv.style.display = 'block';
        }

        function filterTable(type) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            let filtered = allVerbs;
            if (type === 'regular') filtered = allVerbs.filter(v => v.type === 'regular');
            if (type === 'nochange') filtered = allVerbs.filter(v => v.type === 'nochange');
            if (type === 'irregular') filtered = allVerbs.filter(v => v.type === 'irregular');
            renderTable(filtered);
        }

        function renderTable(verbs) {
            const table = document.getElementById('full-table');
            table.innerHTML = `<tr><th>Base Form</th><th>Present Participle</th><th>Past Tense</th><th>Past Participle</th></tr>`;
            verbs.forEach(verb => {
                const row = table.insertRow();
                let rowClass = '';
                if (verb.type === 'regular') rowClass = 'regular';
                else if (verb.type === 'nochange') rowClass = 'nochange';
                else if (verb.group === 'ought') rowClass = 'group-ought';
                else if (verb.group === 'vowel') rowClass = 'group-vowel';
                else if (verb.group === 'ew') rowClass = 'group-ew';
                else if (verb.group === 'oke') rowClass = 'group-oke';
                else if (verb.group === 'it') rowClass = 'group-it';
                else if (verb.group === 'ave') rowClass = 'group-ave';
                else if (verb.group === 'eat') rowClass = 'group-eat';
                else rowClass = 'group-other';
                row.className = rowClass;
                row.innerHTML = `<td><strong>${verb.base}</strong></td><td>${verb.ing}</td><td>${verb.past}</td><td>${verb.pp}</td>`;
            });
        }

        window.onload = startNewQuiz;
    </script>
</body>
</html>
